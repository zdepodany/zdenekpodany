backend:
  name: git-gateway
  branch: main
  site_domain: zdenekpodany-web.netlify.app

media_folder: public/img
public_folder: /img

locale: cs

collections:
  - name: blog
    label: Blog
    folder: content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Nadpis, name: title, widget: string }
      - { label: Popis, name: description, widget: string }
      - { label: Datum, name: date, widget: datetime, format: YYYY-MM-DD, date_format: DD. MM. YYYY, time_format: false }
      - { label: Obrázek, name: image, widget: image, required: false, allow_multiple: false }
      - label: Štítky
        name: tags
        widget: list
        default: [blog]
      - { label: Obsah, name: body, widget: markdown }
